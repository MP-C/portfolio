<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙🏻‍♂️MagicHomeDashboard⛺</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./homedashboard/style.css">
</head>
<body>

<div class="stats-bar mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="fw-bold">marioc.<span style="color:var(--accent)">eu</span></div>
        <div class="d-flex gap-3 small align-items-center">
            <span id="weather-widget" class="stat-badge py-1 px-2 d-flex gap-2" style="font-size: 0.75rem; background: rgba(255,255,255,0.08);">
                <span><i class="fas fa-temperature-high text-primary"></i> <span id="temp-val">...</span></span>
                <span class="d-none d-md-inline border-start border-secondary ps-2"><i class="fas fa-droplet text-info"></i> <span id="hum-val">...</span></span>
                <span class="d-none d-md-inline border-start border-secondary ps-2"><i class="fas fa-wind"></i> <span id="wind-val">...</span></span>
            </span>
            <span>CPU: <b id="cpu-load">0%</b></span>
            <span>RAM: <b id="ram-load">0%</b></span>
            <span><span class="status-indicator"></span> SYSTEM UP</span>
        </div>
    </div>
</div>
<div class="container">
    <header class="text-center mb-5">
        <h1 class="display-5 fw-bold mb-1">AllAtHome <span id="weather-icon-title"></span></h1>
        <p class="" style="color: black;">Self-Hosted Infrastructure & Full-Stack Development</p>
        
        <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
            <div class="stat-badge"><i class="fab fa-docker"></i> Docker Expert</div>
            <div class="stat-badge"><i class="fab fa-python"></i> Python/FastAPI</div>
            <div class="stat-badge"><i class="fas fa-database"></i> SQL & NoSQL</div>
            <div class="stat-badge"><i class="fas fa-network-wired"></i> Reverse Proxies</div>
            <div class="stat-badge"><i class="fas fa-server"></i> Linux Admin</div>
            <div class="stat-badge"><i class="fab fa-js"></i> Full-Stack Dev</div>
        </div>
    </header>

    <div class="row g-4 justify-content-center" id="services-grid"></div>

    <footer class="text-center mt-5 pt-4 pb-5 opacity-50">
        <p>© 2026 Mário C. | Built with ❤️ and Docker</p>
    </footer>
</div>

<script src="./homedashboard/data.js"></script>
</body>
</html>
